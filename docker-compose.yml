# ============================================================
# docker-compose.yml — FastAPI Microservice Template
#
# Usage:
#   docker compose up -d              # start core stack
#   docker compose up -d --build      # rebuild + start
#   docker compose logs -f api        # tail API logs
#   docker compose down -v            # tear down (incl. volumes)
#
# Profiles (opt-in services):
#   docker compose --profile tools up -d      # + pgadmin
#   docker compose --profile monitoring up -d  # + prometheus + grafana
#   docker compose --profile cache up -d       # + redis
# ============================================================

services:
  # ------------------------------------------------------------------ #
  # FastAPI Application
  # ------------------------------------------------------------------ #
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    container_name: fastapi-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override specific vars for the container environment
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      ENVIRONMENT: ${ENVIRONMENT:-production}
      HOST: "0.0.0.0"
      PORT: ${PORT:-8000}
      WORKERS: ${WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RELOAD: "false"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${PORT:-8000}/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ------------------------------------------------------------------ #
  # PostgreSQL Database
  # ------------------------------------------------------------------ #
  postgres:
    image: postgres:17-alpine
    container_name: fastapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_db}
      # Harden: disable trust auth, require password for all connections
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fastapi_db}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ================================================================== #
  # OPTIONAL SERVICES — activate with --profile <name>
  # ================================================================== #

  # ------------------------------------------------------------------ #
  # Redis (caching, session store, rate limiting)
  # Activate: docker compose --profile cache up -d
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    container_name: fastapi-redis
    restart: unless-stopped
    profiles:
      - cache
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-changeme}
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ------------------------------------------------------------------ #
  # PgAdmin (database management UI)
  # Activate: docker compose --profile tools up -d
  # ------------------------------------------------------------------ #
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastapi-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ------------------------------------------------------------------ #
  # Prometheus (metrics collection)
  # Activate: docker compose --profile monitoring up -d
  # Note: Mount a prometheus.yml config at ./monitoring/prometheus.yml
  # ------------------------------------------------------------------ #
  prometheus:
    image: prom/prometheus:latest
    container_name: fastapi-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ------------------------------------------------------------------ #
  # Grafana (metrics visualisation)
  # Activate: docker compose --profile monitoring up -d
  # ------------------------------------------------------------------ #
  grafana:
    image: grafana/grafana:latest
    container_name: fastapi-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ------------------------------------------------------------------ #
# Named Volumes
# ------------------------------------------------------------------ #
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ------------------------------------------------------------------ #
# Networks
# ------------------------------------------------------------------ #
networks:
  app-network:
    driver: bridge
    name: fastapi-network
