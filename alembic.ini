# Alembic Configuration
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used when generating new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path for importing the application
prepend_sys_path = .

# Timezone for migration timestamps
# timezone =

# Truncate long lines in migration files
truncate_slug_length = 40

# Revision environment for concurrent access
revision_environment = false

# Allow autogenerate to detect type changes
compare_type = true

# Allow autogenerate to detect server defaults
compare_server_default = false

# Target metadata module (set in env.py)
# sqlalchemy.url — managed programmatically in env.py via app settings

[post_write_hooks]
# Uncomment to auto-format generated migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
